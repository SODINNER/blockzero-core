# Release Block Zero CLI binaries (testnet mining)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUILD_FLAGS: >-
    -DBUILD_GUI=OFF
    -DENABLE_IPC=OFF
    -DBUILD_TESTS=OFF
    -DENABLE_WALLET=ON
    -DCMAKE_CXX_STANDARD=20

jobs:
  linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config python3 \
            libevent-dev libboost-dev libsqlite3-dev

      - name: Build
        run: |
          cmake -B build ${{ env.BUILD_FLAGS }}
          cmake --build build -j"$(nproc)" --target bitcoind bitcoin-cli

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="blockzero-${TAG}-linux-x64"
          mkdir -p "${PKG}/bin"
          cp build/bin/bitcoind build/bin/bitcoin-cli "${PKG}/bin/"
          cp contrib/testnet/bitcoin.conf.example "${PKG}/bitcoin.conf.example"
          tar -czf "${PKG}.tar.gz" "${PKG}"
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            blockzero-*-linux-x64.tar.gz
            blockzero-*-linux-x64.tar.gz.sha256

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake boost libevent pkg-config

      - name: Build
        run: |
          cmake -B build ${{ env.BUILD_FLAGS }}
          cmake --build build -j"$(sysctl -n hw.ncpu)" --target bitcoind bitcoin-cli

      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="blockzero-${TAG}-macos-${{ matrix.arch }}"
          mkdir -p "${PKG}/bin"
          cp build/bin/bitcoind build/bin/bitcoin-cli "${PKG}/bin/"
          cp contrib/testnet/bitcoin.conf.example "${PKG}/bitcoin.conf.example"
          tar -czf "${PKG}.tar.gz" "${PKG}"
          shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            blockzero-*-macos-*.tar.gz
            blockzero-*-macos-*.tar.gz.sha256

  windows-x64:
    runs-on: windows-2025-vs2026
    timeout-minutes: 180
    env:
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Import Visual Studio env vars
        run: py -3 .github/ci-windows.py standard github_import_vs_env

      - name: Configure vcpkg
        shell: bash
        run: |
          echo "set(VCPKG_BUILD_TYPE release)" >> "${VCPKG_INSTALLATION_ROOT}/triplets/x64-windows-static.cmake"
          sed -i '1s/^/set(ENV{CMAKE_POLICY_VERSION_MINIMUM} 3.5)\n/' "${VCPKG_INSTALLATION_ROOT}/scripts/ports.cmake"

      - name: Set VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=${VCPKG_INSTALLATION_ROOT}" >> "$GITHUB_ENV"

      - name: Generate build system
        run: |
          cmake -B build --preset vs2026-static `
            -DBUILD_GUI=OFF `
            -DENABLE_IPC=OFF `
            -DBUILD_TESTS=OFF `
            -DENABLE_WALLET=ON `
            -DWITH_ZMQ=OFF `
            -DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON `
            -DVCPKG_MANIFEST_FEATURES=wallet

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS --target bitcoind bitcoin-cli

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="blockzero-${TAG}-windows-x64"
          mkdir -p "${PKG}/bin"
          cp build/bin/Release/bitcoind.exe build/bin/Release/bitcoin-cli.exe "${PKG}/bin/"
          cp contrib/testnet/bitcoin.conf.example "${PKG}/bitcoin.conf.example"
          powershell -Command "Compress-Archive -Path '${PKG}' -DestinationPath '${PKG}.zip' -Force"
          sha256sum "${PKG}.zip" > "${PKG}.zip.sha256"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            blockzero-*-windows-x64.zip
            blockzero-*-windows-x64.zip.sha256
